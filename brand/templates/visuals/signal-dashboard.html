<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1600" />
  <title>QuantApexAI — Signal Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1600px;
      height: 900px;
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      height: 900px;
      padding: 48px 120px 40px;
      gap: 28px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.8px;
      max-width: 1000px;
      line-height: 1.2;
    }
    .brand {
      font-size: 20px;
      font-weight: 700;
      color: #f8fafc;
      white-space: nowrap;
    }
    .brand .ai {
      color: #6366f1;
    }
    .divider {
      height: 2px;
      background: linear-gradient(to right, #6366f1, #1e293b);
      border-radius: 1px;
    }

    /* ── Signal List ── */
    .signal-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
      justify-content: center;
    }

    /* ── Signal Item ── */
    /* Items injected via {{items_html}} using this structure:
       <div class="signal-item">
         <div class="dot green"></div>
         <div class="signal-info">
           <div class="signal-label">Label text</div>
           <div class="signal-note">Supporting note</div>
         </div>
         <div class="signal-value">$94,200</div>
       </div>
    */
    .signal-item {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      align-items: center;
      gap: 24px;
      background: #1e293b;
      border-radius: 14px;
      padding: 20px 36px 20px 28px;
    }

    /* Signal Dot */
    .dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green {
      background: #22c55e;
      box-shadow: 0 0 12px 3px rgba(34, 197, 94, 0.45);
    }
    .dot.red {
      background: #ef4444;
      box-shadow: 0 0 12px 3px rgba(239, 68, 68, 0.45);
    }
    .dot.amber {
      background: #f59e0b;
      box-shadow: 0 0 12px 3px rgba(245, 158, 11, 0.45);
    }

    /* Signal Info */
    .signal-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .signal-label {
      font-size: 18px;
      font-weight: 600;
      color: #f8fafc;
    }
    .signal-note {
      font-size: 14px;
      font-weight: 400;
      color: #64748b;
    }

    /* Signal Value */
    .signal-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: right;
      color: #f8fafc;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }
    .footer-text {
      font-size: 13px;
      font-weight: 400;
      color: #334155;
    }
    .footer-text span {
      color: #6366f1;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Header -->
    <div class="header">
      <div class="title">{{title}}</div>
      <div class="brand">Quant<span class="ai">Apex</span><span class="ai">AI</span></div>
    </div>
    <div class="divider"></div>

    <!-- Signal List -->
    <div class="signal-list">
      {{items_html}}
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-text">Data for context only — not financial advice &nbsp;·&nbsp; <span>QuantApexAI</span></div>
    </div>

  </div>
</body>
</html>
